name: Docker Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Set image names
        id: images
        shell: bash
        run: |
          owner="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}"
          echo "api=${owner}/ohmstash-api" >> "$GITHUB_OUTPUT"
          echo "caddy=${owner}/ohmstash-caddy" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.images.outputs.api }}:latest
            ${{ steps.images.outputs.api }}:sha-${{ github.sha }}

      - name: Build and push Caddy image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.caddy
          push: true
          tags: |
            ${{ steps.images.outputs.caddy }}:latest
            ${{ steps.images.outputs.caddy }}:sha-${{ github.sha }}
